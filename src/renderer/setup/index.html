<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lexicon 初次設定</title>
  </head>
  <body>
    <main class="setup-shell">
      <p class="eyebrow">Lexicon · First setup</p>
      <h1>先下載翻譯模型</h1>
      <p class="lead">Lexicon 會在你的電腦本機執行 Gemma 4，不會把翻譯內容送到雲端。</p>

      <section class="model-card">
        <div class="model-card-heading">
          <div>
            <h2>Gemma 4 E2B</h2>
            <p>最小 GGUF 版本 · 約 2.29 GB · 只下載一次</p>
          </div>
          <span id="model-badge" class="badge">尚未下載</span>
        </div>

        <div class="progress-track" aria-hidden="true">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <p id="progress-label" class="progress-label">按下按鈕開始下載</p>
        <p id="setup-status" class="status-message" role="status" aria-live="polite"></p>

        <div class="setup-actions">
          <button id="download-button" class="primary-button" type="button">下載模型</button>
          <button id="later-button" class="secondary-button" type="button">稍後再說</button>
        </div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
